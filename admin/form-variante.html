<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Variante — Caina Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <nav class="admin-nav">
        <div class="admin-nav-left">
            <span class="admin-nav-logo">Caina</span>
            <span class="admin-nav-badge">Admin</span>
        </div>
        <div class="admin-nav-right">
            <a id="back-link" href="#" class="nav-back">← Volver al Producto</a>
        </div>
    </nav>

    <div class="admin-wrapper">

        <div class="page-title-bar">
            <h1 id="form-title">Editar Variante</h1>
        </div>

        <form id="variant-form">

            <div class="form-group">
                <label for="stock">Stock</label>
                <input type="number" id="stock" placeholder="0" required>
            </div>

            <div class="form-group multi-select">
                <label>Materiales</label>
                <div id="materials-checkboxes" class="checkbox-group">
                    Cargando materiales...
                </div>
            </div>

            <div class="form-group multi-select">
                <label>Tamaños</label>
                <div id="sizes-checkboxes" class="checkbox-group">
                    Cargando tamaños...
                </div>
            </div>

            <button type="submit">Guardar Cambios en Variante</button>

        </form>

        <div id="feedback-message" class="feedback"></div>

    </div>

    <script type="module" src="js/form-variante.js"></script>
</body>
</html>
