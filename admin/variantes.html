<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variantes — CAINA Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <nav class="admin-nav">
        <div class="admin-nav-left">
            <span class="admin-nav-logo">CAINA</span>
            <span class="admin-nav-badge">Admin</span>
        </div>
        <div class="admin-nav-right">
            <a href="panel.html" class="nav-back">← Volver al Panel</a>
        </div>
    </nav>

    <div class="admin-wrapper">

        <div class="page-title-bar">
            <h1>Centro de Control de Variantes</h1>
        </div>

        <div id="filters">
            <input type="text" id="filter-text" placeholder="Buscar por nombre de producto...">
        </div>

        <div class="table-wrap">
            <table id="variants-table">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Variante (Material / Tamaño)</th>
                        <th>Precio Calculado</th>
                    </tr>
                </thead>
                <tbody id="variants-list">
                    <!-- Las filas de variantes se cargarán aquí dinámicamente -->
                </tbody>
            </table>
        </div>

    </div>

    <script type="module" src="js/variantes.js"></script>
</body>
</html>
