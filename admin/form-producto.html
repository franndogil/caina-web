<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Producto — Caina Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <nav class="admin-nav">
        <div class="admin-nav-left">
            <span class="admin-nav-logo">Caina</span>
            <span class="admin-nav-badge">Admin</span>
        </div>
        <div class="admin-nav-right">
            <a href="panel.html" class="nav-back">← Volver al Panel</a>
        </div>
    </nav>

    <div class="admin-wrapper">

        <div class="page-title-bar">
            <h1 id="form-title">Añadir Nuevo Producto</h1>
        </div>

        <form id="product-form">

            <div class="form-group">
                <label for="product-name">Nombre del Producto</label>
                <input type="text" id="product-name" placeholder="Ej: Sticker personalizado" required>
            </div>

            <div class="form-group">
                <label for="product-description">Descripción</label>
                <textarea id="product-description" rows="3" placeholder="Descripción del producto..."></textarea>
            </div>

            <div class="form-group">
                <label for="product-type">Tipo de Producto (Base)</label>
                <select id="product-type" required>
                    <option value="">Cargando tipos...</option>
                </select>
            </div>

            <hr>

            <h2>Atributos para variantes automáticas</h2>

            <p id="edit-mode-notice" style="display: none;">
                <strong>Modo Edición:</strong> La selección de materiales y tamaños no se puede cambiar para evitar alterar las variantes existentes.
            </p>

            <div class="form-group">
                <label>Materiales Disponibles</label>
                <div id="product-materials" class="checkbox-group"></div>
            </div>

            <div class="form-group">
                <label>Tamaños Disponibles</label>
                <div id="product-sizes" class="checkbox-group"></div>
            </div>

            <hr>

            <h2>Organización</h2>

            <div class="form-group">
                <label>Categorías</label>
                <div id="product-categories" class="checkbox-group"></div>
            </div>

            <button type="submit" id="save-product-button">Guardar Producto y Generar Variantes</button>

        </form>

    </div>

    <script type="module" src="js/form-producto.js"></script>
</body>
</html>
