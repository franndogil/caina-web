<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>CAINA | Armá tu pedido</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/store.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/sidebar-filtros.css">
  </head>

  <body>
    <!-- NAV -->
    <div id="nav-root"></div>

    <section class="products">

      <div class="sec-header">
        <h2 class="sec-title">Armá tu pedido</h2>
        <p class="sec-sub">Seleccioná lo que quieras y te lo preparamos.</p>
      </div>

      <div class="sf-catalogo-wrap">
        <!-- Sidebar de filtros -->
        <div id="sidebar-filtros">
          <p class="sf-loading">Cargando…</p>
        </div>

        <!-- Catálogo populado por catalogo.js -->
        <div id="productos">
          <p style="color: var(--muted); text-align: center; padding: 2rem 0;">Cargando productos…</p>
        </div>
      </div>

      <div class="resumen" id="resumen">
        <h2 class="sec-title">Tu pedido</h2>
        <div id="lista">No hay productos todavía</div>
        <div id="total" class="total"></div>

        <a href="#" onclick="enviarPedido()" class="btn-primary">
          Enviar por WhatsApp
        </a>
      </div>

    </section>
    <div id="modal-img" class="modal-img">
      <span class="cerrar" onclick="cerrarImagen()">×</span>
      <img id="modal-contenido">
    </div>

    <!-- MODAL SELECTOR DE STICKER -->
    <div id="sticker-modal" class="sticker-modal" role="dialog" aria-modal="true">
      <div class="sticker-modal-card">
        <div class="sticker-modal-card-header">
          <button class="sticker-modal-close" onclick="cerrarSticker()" aria-label="Cerrar">×</button>
        </div>
        <div id="sticker-modal-body" class="sticker-modal-body"></div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-left">
        <span class="footer-logo">CAINA</span>
        <p>Gráfica personalizada · Zona Sur, Argentina</p>
      </div>
      <div class="footer-social">
        <a href="https://wa.me/5491138454766?text=Hola%20CAINA%2C%20quiero%20hacer%20un%20pedido!" target="_blank" class="social-btn" title="WhatsApp"><img src="" alt=""></a>
        <a href="https://www.instagram.com/caina.stickers/" target="_blank" class="social-btn" title="Instagram"><img src="" alt=""></a>
      </div>
      <div class="powered-by">
        <p>Powered By<a href="https://fmdcomputacion.com/"><img src="/assets/sponsors/fmdcomputacion.png" alt=""></a></p>
      </div>
    </footer>

    <!-- BOTÓN FLOTANTE IR AL CARRITO -->
    <button class="carrito-float" onclick="irAlCarrito()" aria-label="Ver pedido">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      Ver pedido
      <span class="carrito-float-badge" id="carrito-badge"></span>
    </button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/catalogo.js"></script>
  <script src="/js/carrito.js"></script>
  <script src="/js/filtros.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      new SidebarFiltros('sidebar-filtros', {
        onFiltrar: function (f) { window.actualizarFiltrosSidebar(f); }
      }).init();
    });
  </script>

</body>
</html>
