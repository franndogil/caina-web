<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Armar pedido | CAINA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/store.css">
  </head>

  <body>
    <nav>
      <a href="index.html" class="nav-logo">CAINA</a>

      <ul class="nav-links"></ul>

      <div class="nav-right">
        <a href="index.html" class="nav-back">← Volver</a>
      </div>
    </nav>

    <section class="products">

      <div class="sec-header">
        <p class="sec-label">CAINA</p>
        <h2 class="sec-title">Armá tu pedido</h2>
        <p class="sec-sub">Seleccioná lo que quieras y te lo preparamos.</p>
      </div>

      <div class="products-grid" id="productos"></div>

      <div class="resumen">
        <h2 class="sec-title">Tu pedido</h2>
        <div id="lista">No hay productos todavía</div>
        <div id="total" class="total"></div>

        <a href="#" onclick="enviarPedido()" class="btn-primary">
          Enviar por WhatsApp
        </a>
      </div>

    </section>

    <script src="js/carrito.js"></script>
    <script src="js/catalogo.js"></script>

    <div id="modal-img" class="modal-img">
      <span class="cerrar" onclick="cerrarImagen()">×</span>
      <img id="modal-contenido">
    </div>
